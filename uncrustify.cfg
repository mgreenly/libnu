# Uncrustify configuration to match clang-format with forced function parameter breaking
#
# GOALS:
# 1. Force ALL function definitions to have multi-line parameters (even short ones)
# 2. Keep 120-character line limit for function bodies
# 3. Match all other clang-format behaviors exactly

# Basic indentation settings (match clang-format IndentWidth: 2)
indent_columns                  = 2
indent_with_tabs                = 0
input_tab_size                  = 2
output_tab_size                 = 2

# Line endings and width (match clang-format ColumnLimit: 120)
newlines                        = lf
code_width                      = 120
ls_func_split_full              = false    # Don't split function definitions due to line length

# === CRITICAL FUNCTION PARAMETER SETTINGS ===
# These force function definition parameters to break regardless of length
# Opening paren goes on its own line (uncrustify's natural behavior)
nl_func_def_start               = remove   # Keep opening paren on same line as function name
nl_func_def_paren               = add      # Add newline after opening paren in func def
nl_func_def_args                = ignore   # Let line width determine parameter breaking
nl_func_def_args_multi_line     = false    # Don't force newlines in multi-line
nl_func_def_end                 = add      # Force closing paren on its own line
indent_func_def_param           = true     # Indent parameters (matches 2-space indent)
sp_func_def_paren               = remove   # No space between function name and opening paren
indent_paren_nl                 = false    # Don't indent parentheses on new lines
indent_paren_after_func_def     = false    # Don't indent paren after func def
nl_fdef_brace                   = remove   # Keep ") {" on same line

# Additional settings to force parameter breaking in older uncrustify
nl_func_decl_start              = ignore   # Don't add extra newlines at start
nl_func_decl_args               = ignore   # Let line width determine parameter breaking
nl_func_decl_end                = ignore   # Don't add extra newlines at end
sp_func_proto_paren             = remove   # No space between function name and paren in prototypes

# Force consistent formatting for ALL function types
nl_after_func_proto_group       = 2        # Blank lines after function prototype groups

# Function call parameters - DON'T force breaking (only break if needed for 120 chars)
nl_func_call_paren              = ignore   # Let line length determine call formatting

# Function return type and name (matches clang-format AlwaysBreakAfterReturnType: TopLevel)
nl_func_type_name               = add      # Force newline between return type and function name
nl_func_type_name_class         = add      # Same for class methods

# Function brace placement (matches clang-format AfterFunction: false)
nl_fdef_brace                   = remove   # Keep ) { on same line
nl_fcall_brace                  = remove   # Function call braces on same line
sp_fparen_brace                 = add      # Add space between ) and { in function definitions

# Pointer alignment (matches clang-format PointerAlignment: Right)
sp_before_ptr_star              = remove   # No space before *
sp_after_ptr_star               = add      # Space after * (char *pa)
sp_before_ptr_star_func         = remove   # No space before * in function params

# Cast spacing (matches clang-format SpaceAfterCStyleCast: true)
sp_after_cast                   = add      # Space after cast: (char *) a

# Control statement spacing (matches clang-format SpaceBeforeParens: ControlStatements)
sp_before_sparen                = add      # Space before control statement parens: if (
sp_after_sparen                 = remove   # No space after control statement parens
sp_sparen_brace                 = add      # Space between ) and { in control statements

# Parentheses spacing
sp_inside_paren                 = remove   # No space inside parentheses
sp_paren_paren                  = remove   # No space between nested parentheses

# Semicolon spacing
sp_before_semi                  = remove   # No space before semicolon
sp_before_semi_for_empty        = remove   # No space before semicolon in empty for

# Assignment alignment (matches clang-format AlignConsecutiveAssignments: true)
align_assign_span               = 3        # Align assignments within 3 lines
align_assign_thresh             = 12       # Allow up to 12 spaces for alignment

# Variable definition alignment (matches clang-format AlignConsecutiveDeclarations: false)
align_var_def_span              = 0        # Don't align variable definitions
align_var_def_thresh            = 0

# Comment alignment (matches clang-format AlignTrailingComments: true)
# align_trailing_comment is not available in older uncrustify versions

# Brace style - K&R style (matches clang-format BreakBeforeBraces: Custom settings)
nl_if_brace                     = remove   # if (...) {
nl_else_brace                   = remove   # } else {
nl_elseif_brace                 = remove   # } else if (...) {
nl_while_brace                  = remove   # while (...) {
nl_for_brace                    = remove   # for (...) {
nl_do_brace                     = remove   # do {
nl_switch_brace                 = remove   # switch (...) {
nl_brace_while                  = remove   # } while
nl_brace_else                   = remove   # } else

# Case label indentation (matches clang-format IndentCaseLabels: true)
indent_switch_case              = 2        # Indent case labels (older uncrustify option name)
indent_case_brace               = 2        # Indent case statement braces

# Empty lines (matches clang-format MaxEmptyLinesToKeep: 1)
nl_max                          = 2        # Allow max 2 consecutive empty lines
eat_blanks_after_open_brace     = true     # Remove blank lines after {
eat_blanks_before_close_brace   = true     # Remove blank lines before }

# End of file (matches clang-format InsertNewlineAtEOF: true)
nl_end_of_file                  = add      # Ensure newline at end of file
nl_end_of_file_min              = 1        # Exactly 1 newline at end

# Comment formatting (matches clang-format ReflowComments: true)
cmt_reflow_mode                 = 1        # Reflow comments to fit line width

# Don't modify these constructs (preserve existing style)
mod_full_brace_do               = ignore   # Don't add braces to do statements
mod_full_brace_for              = ignore   # Don't add braces to for statements
mod_full_brace_function         = ignore   # Don't modify function braces
mod_full_brace_if               = ignore   # Don't add braces to if statements
mod_full_brace_while            = ignore   # Don't add braces to while statements

# Macro formatting
pp_indent                       = remove   # Don't indent preprocessor directives
pp_define_at_level              = false    # Don't indent #define to brace level